name: trust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Setup Kotlin
        run: |
          curl -L https://github.com/JetBrains/kotlin/releases/download/v2.0.0/kotlin-compiler-2.0.0.zip -o kotlin.zip
          unzip kotlin.zip
          echo "$PWD/kotlinc/bin" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@9d32b5786d2e9e4d39fc581c0091c721ee3d4226 # v1.0.0
